services:
  web:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - path: .env.example
        required: true
      - path: .env
        required: false
    environment:
      DATABASE_URL: sqlite:////app/storage/app.db
      STORAGE_DIR: /app/storage
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - path: .env.example
        required: true
      - path: .env
        required: false
    environment:
      DATABASE_URL: sqlite:////app/storage/app.db
      STORAGE_DIR: /app/storage
      REDIS_URL: redis://redis:6379/0
    command: python -m app.workers.worker
    volumes:
      - ./storage:/app/storage
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

volumes:
  redis-data:
